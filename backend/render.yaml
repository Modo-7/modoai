services:
  - type: web
    name: modoai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: modoai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: HF_API_KEY
        sync: false
